type: github_trending_multi
params:
  per_dim_limit: 25   # 每维度 (日/周/月) 从 RSSHub 抓 25 条, 前端按维度截 top 15

  # total 维度用 GitHub Search API, 真正全站按总 star 排
  total_queries:
    - "claude in:name,description,readme"
    - "topic:mcp"
  total_per_query_limit: 30   # 每个 query 取前 N
  total_min_stars: 30         # 过滤不成熟小项目
